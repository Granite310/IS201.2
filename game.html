        <script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const restartBtn = document.getElementById("restartBtn");

// ---------------- AUDIO ----------------
let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
document.addEventListener("keydown", initAudio);
document.addEventListener("click", initAudio);

function beep(f, d, t="square") {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = t;
    o.frequency.value = f;
    g.gain.value = 0.08;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + d);
}

const soundJump = () => beep(520, 0.07);
const soundHit = () => beep(110, 0.3, "sawtooth");

// ---------------- GAME STATE ----------------
let dino = {
    x: 60,
    y: 200,
    w: 40,
    h: 40,
    vy: 0,
    jumping: false,
    frame: 0
};

let groundY = 200;
let gravity = 0.6;

let obstacles = [];
let score = 0;
let gameOver = false;
let speed = 6;
let time = 0;
let level = 1;
let started = false;

// ---------------- HIGH SCORE ----------------
let highScore = localStorage.getItem("dinoHighScore") || 0;

// ---------------- INPUT ----------------
document.addEventListener("keydown", (e) => {
    if (!started) started = true;
    if (e.code === "Space") jump();
});

canvas.addEventListener("click", () => {
    if (!started) started = true;
    jump();
});

function jump() {
    if (dino.jumping || gameOver) return;
    dino.vy = -11;
    dino.jumping = true;
    soundJump();
}

// ---------------- OBSTACLES ----------------
function spawnObstacle() {
    const bird = Math.random() < 0.35;

    if (bird) {
        obstacles.push({
            x: canvas.width,
            y: groundY - 90 - Math.random() * 40,
            w: 35,
            h: 25,
            type: "bird",
            flap: Math.random() * 10
        });
    } else {
        const sizes = [
            { w: 18, h: 40 },
            { w: 28, h: 50 },
            { w: 14, h: 30 },
            { w: 38, h: 45 }
        ];

        const s = sizes[Math.floor(Math.random() * sizes.length)];

        obstacles.push({
            x: canvas.width,
            y: groundY + 10,
            w: s.w,
            h: s.h,
            type: "cactus",
            variant: Math.floor(Math.random() * 3)
        });
    }
}

// ---------------- PARALLAX BACKGROUND ----------------
function drawBackground() {
    const sky = (Math.sin(time / 600) + 1) / 2;

    ctx.fillStyle = `rgb(${200*sky + 30*(1-sky)}, ${220*sky + 40*(1-sky)}, ${255*sky})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // mountains
    ctx.fillStyle = "rgba(120,120,120,0.3)";
    for (let i = 0; i < 3; i++) {
        let x = (time * 0.2 + i * 250) % (canvas.width + 200);
        ctx.beginPath();
        ctx.moveTo(x, groundY + 40);
        ctx.lineTo(x + 120, 120);
        ctx.lineTo(x + 240, groundY + 40);
        ctx.fill();
    }

    // clouds
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    for (let i = 0; i < 5; i++) {
        let x = (time * 0.5 + i * 180) % (canvas.width + 100);
        ctx.beginPath();
        ctx.arc(x, 60 + i * 10, 20, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ---------------- TREX ----------------
function drawDino(x, y, bounce) {
    ctx.fillStyle = "#111";

    // body
    ctx.fillRect(x + 5, y + bounce, 28, 18);

    // tail
    ctx.beginPath();
    ctx.moveTo(x + 5, y + 10 + bounce);
    ctx.lineTo(x - 10, y + 15 + bounce);
    ctx.lineTo(x + 5, y + 18 + bounce);
    ctx.fill();

    // head
    ctx.fillRect(x + 25, y - 10 + bounce, 18, 18);

    // jaw
    ctx.fillRect(x + 32, y + 5 + bounce, 15, 6);

    // eye
    ctx.fillStyle = "white";
    ctx.fillRect(x + 37, y - 5 + bounce, 3, 3);

    // legs
    ctx.fillStyle = "#111";
    let leg = Math.sin(dino.frame * 0.3) * 2;
    ctx.fillRect(x + 10, y + 20 + bounce, 6, 12 + leg);
    ctx.fillRect(x + 22, y + 20 + bounce, 6, 12 - leg);
}

// ---------------- BIRD ----------------
function drawBird(o) {
    o.flap += 0.25;

    ctx.fillStyle = "#2f2f2f";

    let wing = Math.sin(o.flap) * 6;

    ctx.beginPath();
    ctx.moveTo(o.x, o.y + wing);
    ctx.lineTo(o.x + 15, o.y - 10 + wing);
    ctx.lineTo(o.x + 30, o.y + wing);
    ctx.lineTo(o.x + 15, o.y + 5 + wing);
    ctx.fill();

    ctx.fillRect(o.x + 12, o.y, 10, 8);
    ctx.fillRect(o.x + 22, o.y - 3, 6, 6);
}

// ---------------- LOOP ----------------
function update() {
    if (gameOver) return;

    time++;

    drawBackground();

    // ground
    ctx.fillStyle = "#333";
    ctx.fillRect(0, groundY + 40, canvas.width, 2);

    // start screen
    if (!started) {
        ctx.fillStyle = "#111";
        ctx.font = "20px Arial";
        ctx.fillText("Click or Press Space to Start", 200, 120);
        requestAnimationFrame(update);
        return;
    }

    // speed scaling
    speed += 0.002;

    // level system
    let newLevel = Math.floor(score / 500) + 1;
    if (newLevel > level) {
        level = newLevel;
        speed += 1;
    }

    // dino physics
    dino.y += dino.vy;
    dino.vy += gravity;

    if (dino.y > groundY) {
        dino.y = groundY;
        dino.vy = 0;
        dino.jumping = false;
    }

    dino.frame++;
    let bounce = Math.sin(dino.frame * 0.2) * 2;

    drawDino(dino.x, dino.y, bounce);

    // obstacles
    for (let o of obstacles) {
        o.x -= speed;

        if (o.type === "cactus") {
            ctx.fillStyle = "#2d6a4f";

            if (o.variant === 0) ctx.fillRect(o.x, o.y, o.w, o.h);
            else if (o.variant === 1) {
                ctx.fillRect(o.x, o.y, o.w/2, o.h);
                ctx.fillRect(o.x + o.w/2, o.y + 10, o.w/2, o.h - 10);
            } else {
                ctx.beginPath();
                ctx.arc(o.x, o.y + 20, o.w/2, 0, Math.PI*2);
                ctx.fill();
            }
        } else {
            drawBird(o);
        }

        // collision
        if (
            dino.x < o.x + o.w &&
            dino.x + dino.w > o.x &&
            dino.y < o.y + o.h &&
            dino.y + dino.h > o.y
        ) {
            gameOver = true;
            soundHit();

            if (score > highScore) {
                highScore = score;
                localStorage.setItem("dinoHighScore", highScore);
            }
        }
    }

    obstacles = obstacles.filter(o => o.x > -60);

    // score
    score++;
    scoreEl.innerHTML =
        "Score: " + Math.floor(score/10) +
        " | High: " + Math.floor(highScore/10) +
        " | Level: " + level;

    requestAnimationFrame(update);
}

// spawn system
function loopSpawn() {
    if (!gameOver) {
        spawnObstacle();
        setTimeout(loopSpawn, Math.max(450, 1200 - speed * 40));
    }
}

// restart
restartBtn.onclick = () => location.reload();

// start
loopSpawn();
update();
</script>
